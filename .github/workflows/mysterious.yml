name: circular

on:
  push:

jobs:
  change:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        density: ["blade", "sensible", "drama", "protective", "pronoun"]
        noble: ["cube", "find", "export", "candy"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar ON.jar
